<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{title}}</title>
  <style>{{common_css}}</style>
</head>
<body>
  <main data-composition-id="logiccut-chapter-card" data-width="{{width}}" data-height="{{height}}" class="template-{{template_id}}" style="--progress: {{progress}}%;">
    <section class="lower-third-stage">
      <div class="lower-video">{{poster_html}}</div>
      <div class="lower-vignette"></div>
      <header class="tech-ribbon"><span>{{label}}</span><b>{{time_label}}</b></header>
      <article class="lower-caption">
        <p>{{hook}}</p>
        <h1>{{title}}</h1>
        <div>{{reason}}</div>
      </article>
      <footer class="tech-footer"><span>{{template_name}}</span><div class="chips">{{keywords_html}}</div></footer>
    </section>
  </main>
</body>
</html>
