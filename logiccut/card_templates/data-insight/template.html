<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{title}}</title>
  <style>{{common_css}}</style>
</head>
<body>
  <main data-composition-id="logiccut-chapter-card" data-width="{{width}}" data-height="{{height}}" class="template-{{template_id}}" style="--progress: {{progress}}%;">
    <section class="stage">
      <article class="copy">
        <span class="eyebrow">{{label}}</span>
        <h1>{{title}}</h1>
        <div class="meta"><span>{{time_label}}</span><div class="progress"><span></span></div></div>
        <div class="stat-card"><b>高光指数</b><strong>{{score_number}}</strong><span>{{hook}}</span></div>
      </article>
      <aside class="media">
        <div class="frame-wrap">{{poster_html}}</div>
        <article class="reason"><b>洞察理由</b><span>{{reason}}</span></article>
        <div class="chips">{{keywords_html}}</div>
      </aside>
    </section>
    <footer><span>{{template_name}}</span><span>LogicCut creator remix</span></footer>
  </main>
</body>
</html>
