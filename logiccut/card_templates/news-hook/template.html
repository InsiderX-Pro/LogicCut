<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{title}}</title>
  <style>{{common_css}}</style>
</head>
<body>
  <main data-composition-id="logiccut-chapter-card" data-width="{{width}}" data-height="{{height}}" class="template-{{template_id}}" style="--progress: {{progress}}%;">
    <section class="stage">
      <article class="copy">
        <span class="eyebrow">{{label}}</span>
        <h1>{{title}}</h1>
        <div class="hook">{{hook}}</div>
        <div class="meta"><span>{{time_label}}</span><div class="progress"><span></span></div></div>
        <article class="reason">
          <b>为什么剪这一段</b>
          <span>{{reason}}</span>
        </article>
      </article>
      <aside class="media">
        <div class="frame-wrap">{{poster_html}}{{score_html}}</div>
        <div class="structure"><strong>剪辑结构</strong><span>{{structure}}</span></div>
        <div class="chips">{{keywords_html}}</div>
      </aside>
    </section>
    <footer><span>{{template_name}}</span><span>LogicCut creator remix</span></footer>
  </main>
</body>
</html>
