<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{title}}</title>
  <style>{{common_css}}</style>
</head>
<body>
  <main data-composition-id="logiccut-chapter-card" data-width="{{width}}" data-height="{{height}}" class="template-{{template_id}}" style="--progress: {{progress}}%;">
    <div class="tech-grid"></div>
    <section class="vertical-news-stage">
      <header class="vertical-headline">{{hook}}</header>
      <article class="vertical-impact">
        <div class="tech-rule"></div>
        <span>{{label}}</span>
        <h1>{{title}}</h1>
      </article>
      <div class="vertical-video">
        {{poster_html}}
        <div class="play-triangle"></div>
      </div>
      <div class="vertical-subtitle">{{structure}}</div>
      <div class="corridor-scene"><span></span><span></span><span></span><span></span><i></i></div>
      <footer class="tech-footer"><span>{{template_name}}</span><span>{{time_label}}</span></footer>
    </section>
  </main>
</body>
</html>
